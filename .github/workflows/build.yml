name: Build Nspire TNS

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'crafti/**.cpp'
      - 'crafti/**.h'
      - 'crafti/Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-arm-none-eabi \
          binutils-arm-none-eabi \
          zlib1g-dev \
          wget \
          unzip
    
    - name: Install nspire-tools
      run: |
        set -e
        echo "Installing nspire-tools..."
        
        # Install genzehn - try multiple sources
        if ! which genzehn >/dev/null 2>&1; then
          echo "Installing genzehn..."
          cd /tmp
          
          # Try official Ndless release assets
          GENZEHN_FOUND=0
          for url in \
            "https://github.com/ndless-nspire/ndless/releases/download/v4.5.2/genzehn" \
            "https://github.com/ndless-nspire/ndless/releases/download/v4.4.0/genzehn"
          do
            if wget -q --timeout=10 "$url" -O genzehn 2>/dev/null; then
              sudo install -m 755 genzehn /usr/local/bin/
              echo "✓ genzehn installed from release"
              GENZEHN_FOUND=1
              break
            fi
          done
          
          # Build from source if binary downloads failed
          if [ $GENZEHN_FOUND -eq 0 ]; then
            echo "Prebuilt genzehn not available - building from source..."
            if [ -d /tmp/ndless-src ]; then
              rm -rf /tmp/ndless-src
            fi
            echo "Cloning Ndless repository..."
            git clone --recursive https://github.com/ndless-nspire/ndless.git /tmp/ndless-src
            
            # Verify clone succeeded and genzehn directory exists
            if [ ! -d /tmp/ndless-src ]; then
              echo "✗ ERROR: Failed to clone Ndless repository"
              exit 1
            fi
            
            # Check multiple possible locations for genzehn
            GENZEHN_DIR=""
            if [ -d /tmp/ndless-src/genzehn ]; then
              GENZEHN_DIR=/tmp/ndless-src/genzehn
            elif [ -d /tmp/ndless-src/ndless/genzehn ]; then
              GENZEHN_DIR=/tmp/ndless-src/ndless/genzehn
            elif [ -d /tmp/ndless-src/tools/genzehn ]; then
              GENZEHN_DIR=/tmp/ndless-src/tools/genzehn
            else
              # Try to find genzehn directory recursively
              echo "⚠ Using find to locate genzehn directory..."
              FOUND_DIR=$(find /tmp/ndless-src -type d -name genzehn 2>/dev/null | head -n 1)
              if [ -n "$FOUND_DIR" ]; then
                GENZEHN_DIR="$FOUND_DIR"
                echo "✓ Found genzehn at: $GENZEHN_DIR"
              fi
            fi
            
            if [ -z "$GENZEHN_DIR" ]; then
              echo "✗ ERROR: genzehn directory not found"
              echo "Checked locations:"
              echo "  - /tmp/ndless-src/genzehn"
              echo "  - /tmp/ndless-src/ndless/genzehn"
              echo "  - /tmp/ndless-src/tools/genzehn"
              echo "Actual repository structure:"
              ls -la /tmp/ndless-src/ 2>/dev/null || true
              if [ -d /tmp/ndless-src/ndless ]; then
                echo "ndless/ subdirectory contents:"
                ls -la /tmp/ndless-src/ndless/ 2>/dev/null || true
              fi
              if [ -d /tmp/ndless-src/tools ]; then
                echo "tools/ subdirectory contents:"
                ls -la /tmp/ndless-src/tools/ 2>/dev/null || true
              fi
              exit 1
            fi
            
            echo "Building genzehn from source at $GENZEHN_DIR..."
            cd "$GENZEHN_DIR"
            make
            
            if [ ! -f genzehn ]; then
              echo "✗ ERROR: genzehn binary not created by make"
              exit 1
            fi
            
            sudo install -m 755 genzehn /usr/local/bin/
            echo "✓ genzehn built from source"
          fi
          
          if ! which genzehn >/dev/null 2>&1; then
            echo "✗ ERROR: genzehn still not available"
            exit 1
          fi
        fi
        
        # Install make-prg
        if ! which make-prg >/dev/null 2>&1; then
          echo "Installing make-prg..."
          cd /tmp
          
          MAKEPRG_FOUND=0
          # Try to get make-prg from Ndless repository
          if wget -q --timeout=10 https://raw.githubusercontent.com/ndless-nspire/ndless/master/bin/make-prg -O make-prg 2>/dev/null; then
            sudo install -m 755 make-prg /usr/local/bin/
            echo "✓ make-prg installed from repo"
            MAKEPRG_FOUND=1
          fi
          
          # Build from source if download failed
          if [ $MAKEPRG_FOUND -eq 0 ]; then
            echo "make-prg not available from repo - building from source..."
            
            # Ensure Ndless source was cloned (from genzehn build, or clone now)
            if [ ! -d /tmp/ndless-src ]; then
              echo "Cloning Ndless repository for make-prg..."
              git clone --recursive https://github.com/ndless-nspire/ndless.git /tmp/ndless-src
            fi
            
            # Check multiple possible locations for bin directory
            BIN_DIR=""
            if [ -d /tmp/ndless-src/bin ]; then
              BIN_DIR=/tmp/ndless-src/bin
            elif [ -d /tmp/ndless-src/ndless/bin ]; then
              BIN_DIR=/tmp/ndless-src/ndless/bin
            elif [ -d /tmp/ndless-src/tools/bin ]; then
              BIN_DIR=/tmp/ndless-src/tools/bin
            else
              # Try to find bin directory recursively (containing make-prg.c)
              echo "⚠ Using find to locate bin directory with make-prg.c..."
              FOUND_DIR=$(find /tmp/ndless-src -type d -name bin 2>/dev/null | while read dir; do
                [ -f "$dir/make-prg.c" ] && echo "$dir" && break
              done)
              if [ -n "$FOUND_DIR" ]; then
                BIN_DIR="$FOUND_DIR"
                echo "✓ Found bin dir at: $BIN_DIR"
              fi
            fi
            
            if [ -z "$BIN_DIR" ]; then
              echo "✗ ERROR: bin directory with make-prg.c not found"
              echo "Checked locations:"
              echo "  - /tmp/ndless-src/bin"
              echo "  - /tmp/ndless-src/ndless/bin"
              echo "  - /tmp/ndless-src/tools/bin"
              echo "Actual repository structure:"
              ls -la /tmp/ndless-src/ 2>/dev/null || true
              if [ -d /tmp/ndless-src/ndless ]; then
                echo "ndless/ subdirectory contents:"
                ls -la /tmp/ndless-src/ndless/ 2>/dev/null || true
              fi
              if [ -d /tmp/ndless-src/tools ]; then
                echo "tools/ subdirectory contents:"
                ls -la /tmp/ndless-src/tools/ 2>/dev/null || true
              fi
              exit 1
            fi
            
            cd "$BIN_DIR"
            if [ ! -f make-prg.c ]; then
              echo "✗ ERROR: make-prg.c not found"
              exit 1
            fi
            
            gcc -o make-prg make-prg.c
            
            if [ ! -f make-prg ]; then
              echo "✗ ERROR: make-prg binary not created by gcc"
              exit 1
            fi
            
            sudo install -m 755 make-prg /usr/local/bin/
            echo "✓ make-prg built from source"
          fi
          
          if ! which make-prg >/dev/null 2>&1; then
            echo "⚠ WARNING: make-prg still not available - continuing without it"
          fi
        fi
        
        echo "Available tools:"
        which genzehn || true
        which make-prg || true
    
    - name: Setup nspire compiler symlinks
      run: |
        sudo ln -sf /usr/bin/arm-none-eabi-gcc /usr/local/bin/nspire-gcc
        sudo ln -sf /usr/bin/arm-none-eabi-g++ /usr/local/bin/nspire-g++
        sudo ln -sf /usr/bin/arm-none-eabi-ld /usr/local/bin/nspire-ld
        sudo ln -sf /usr/bin/arm-none-eabi-as /usr/local/bin/nspire-as
    
    - name: Verify tools
      run: |
        arm-none-eabi-g++ --version
        if which genzehn >/dev/null 2>&1; then
          genzehn --version
        else
          echo "⚠ genzehn not available"
        fi
        if which make-prg >/dev/null 2>&1; then
          make-prg --version
        else
          echo "⚠ make-prg not available"
        fi
    
    - name: Build Crafti Nspire
      run: |
        cd crafti
        
        # Check if we have the necessary tools
        if ! which genzehn >/dev/null 2>&1; then
          echo "⚠ WARNING: genzehn not available - generating .elf only"
          make clean
          make crafti.elf || exit 1
          exit 0
        fi
        
        if ! which make-prg >/dev/null 2>&1; then
          echo "⚠ WARNING: make-prg not available - generating .elf only"
          make clean
          make crafti.elf || exit 1
          exit 0
        fi
        
        # Full build with .tns generation
        echo "Building complete Nspire package..."
        make clean
        make -j$(nproc) || exit 1
        ls -lh crafti.tns
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: crafti-build
        path: |
          crafti/crafti.tns
          crafti/crafti.elf
        retention-days: 30
    
    - name: Upload to releases
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: crafti/crafti.tns
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

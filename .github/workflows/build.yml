name: Build Nspire TNS

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
    paths:
      - '**.cpp'
      - '**.h'
      - 'Makefile'
      - '.github/workflows/build.yml'
      - 'nGL/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-arm-none-eabi \
          binutils-arm-none-eabi \
          zlib1g-dev \
          libboost-program-options-dev \
          libboost-program-options1.74.0 \
          pkg-config \
          wget \
          unzip

    - name: Setup Ndless SDK headers
      run: |
        sudo rm -rf /opt/ndless
        sudo git clone --recurse-submodules https://github.com/ndless-nspire/ndless.git /opt/ndless
        cd /opt/ndless
        sudo git submodule update --init --recursive

        if [ ! -f /opt/ndless/ndless-sdk/include/libndls.h ]; then
          echo "✗ ERROR: ndless-sdk/include/libndls.h not found"
          find /opt/ndless -name libndls.h | head -20
          exit 1
        fi

        if [ ! -f /opt/ndless/ndless-sdk/thirdparty/zlib/configure ]; then
          echo "✗ ERROR: ndless-sdk/thirdparty/zlib/configure not found"
          find /opt/ndless/ndless-sdk -maxdepth 4 -name configure | head -30
          exit 1
        fi

        echo "✓ Ndless SDK header found: /opt/ndless/ndless-sdk/include/libndls.h"
        echo "✓ Ndless thirdparty zlib configure found"
        echo "NDLSSDK=/opt/ndless/ndless-sdk" >> $GITHUB_ENV

        # Ensure nspire-tools command exists for scripts like make-prg.
        NSPIRE_TOOLS_BIN="/opt/ndless/ndless-sdk/bin/nspire-tools"
        if [ -f "$NSPIRE_TOOLS_BIN" ]; then
          sudo ln -sf "$NSPIRE_TOOLS_BIN" /usr/local/bin/nspire-tools
          echo "✓ nspire-tools symlinked to: $NSPIRE_TOOLS_BIN"
        else
          echo "✗ ERROR: nspire-tools script not found at $NSPIRE_TOOLS_BIN"
          exit 1
        fi

        echo "nspire-tools path -> $(nspire-tools path)"
    
    - name: Build zlib for ARM
      run: |
        echo "Building zlib for ARM (arm-none-eabi) target..."
        
        # Create install directory for ARM zlib
        ARM_ZLIB_PREFIX="/opt/arm-zlib"
        sudo mkdir -p "$ARM_ZLIB_PREFIX"
        
        # Download zlib source
        cd /tmp
        ZLIB_VERSION="1.2.13"
        wget -q https://github.com/madler/zlib/archive/refs/tags/v${ZLIB_VERSION}.tar.gz -O zlib-${ZLIB_VERSION}.tar.gz
        tar xzf zlib-${ZLIB_VERSION}.tar.gz
        cd zlib-${ZLIB_VERSION}
        
        # Configure ARM cross-build and only build libz.a.
        # Building zlib test/example binaries for bare-metal causes
        # syscall link errors (_write/_sbrk/_exit, etc.).
        CHOST=arm-none-eabi \
        CC=arm-none-eabi-gcc \
        AR=arm-none-eabi-ar \
        RANLIB=arm-none-eabi-ranlib \
        CFLAGS="-mcpu=arm926ej-s -marm -fPIC" \
        ./configure --prefix="$ARM_ZLIB_PREFIX" --static

        make clean
        make -j$(nproc) libz.a

        sudo install -d "$ARM_ZLIB_PREFIX/include" "$ARM_ZLIB_PREFIX/lib"
        sudo install -m 644 zlib.h zconf.h "$ARM_ZLIB_PREFIX/include/"
        sudo install -m 644 libz.a "$ARM_ZLIB_PREFIX/lib/"
        
        echo "✓ zlib built for ARM at $ARM_ZLIB_PREFIX"
        echo "ARM zlib files:"
        ls -la "$ARM_ZLIB_PREFIX/lib/" || true
        ls -la "$ARM_ZLIB_PREFIX/include/" || true
        
        # Export paths for subsequent builds
        echo "ARM_ZLIB_PREFIX=$ARM_ZLIB_PREFIX" >> $GITHUB_ENV
        echo "CFLAGS=-I$ARM_ZLIB_PREFIX/include" >> $GITHUB_ENV
        echo "LDFLAGS=-L$ARM_ZLIB_PREFIX/lib" >> $GITHUB_ENV
    
    - name: Verify build tools and libraries
      run: |
        echo "Checking build tools and libraries:"
        arm-none-eabi-gcc --version || echo "⚠ arm-none-eabi-gcc not found"
        arm-none-eabi-g++ --version || echo "⚠ arm-none-eabi-g++ not found"
        
        echo ""
        echo "Checking for ARM zlib:"
        ARM_ZLIB_PREFIX="/opt/arm-zlib"
        if [ -f "$ARM_ZLIB_PREFIX/include/zlib.h" ]; then
          echo "✓ zlib.h found at $ARM_ZLIB_PREFIX/include/zlib.h"
          ls -la "$ARM_ZLIB_PREFIX/lib/" | grep -E "\.a|\.so" || echo "⚠ No zlib libraries found"
        else
          echo "✗ ERROR: zlib.h not found!"
          find "$ARM_ZLIB_PREFIX" -name "zlib.h" 2>/dev/null || echo "No zlib.h found anywhere"
          exit 1
        fi
        
        echo ""
        echo "Installed package details:"
        dpkg -l | grep -E "zlib|boost" || echo "⚠ Some packages may be missing"
    
    - name: Install nspire-tools
      run: |
        echo "Building and installing Ndless SDK tools (required for .tns output)..."
        export PATH="/usr/local/bin:$PATH"

        if [ ! -d /opt/ndless/ndless-sdk/tools ]; then
          echo "✗ ERROR: /opt/ndless/ndless-sdk/tools not found"
          exit 1
        fi

        make -C /opt/ndless/ndless-sdk/tools -j"$(nproc)" all

        for bin in nspire-tools genzehn make-prg; do
          if [ ! -x "/opt/ndless/ndless-sdk/bin/$bin" ]; then
            echo "✗ ERROR: /opt/ndless/ndless-sdk/bin/$bin not found after tool build"
            find /opt/ndless/ndless-sdk -maxdepth 4 -name "$bin" -type f | head -20 || true
            exit 1
          fi
          sudo ln -sf "/opt/ndless/ndless-sdk/bin/$bin" "/usr/local/bin/$bin"
          echo "✓ $bin linked from Ndless SDK"
        done
    
    - name: Setup nspire compiler symlinks
      run: |
        ARM_ZLIB_PREFIX="/opt/arm-zlib"
        NDLSSDK="/opt/ndless/ndless-sdk"
        
        # Create wrapper for nspire-gcc
        printf '#!/bin/bash\nexec /usr/bin/arm-none-eabi-gcc -D_TINSPIRE -I%s/include -I%s/include -I%s/include/freetype2 -L%s/lib "$@"\n' "$ARM_ZLIB_PREFIX" "$NDLSSDK" "$NDLSSDK" "$ARM_ZLIB_PREFIX" | sudo tee /usr/local/bin/nspire-gcc > /dev/null
        
        # Create wrapper for nspire-g++
        printf '#!/bin/bash\nexec /usr/bin/arm-none-eabi-g++ -D_TINSPIRE -I%s/include -I%s/include -I%s/include/freetype2 -L%s/lib "$@"\n' "$ARM_ZLIB_PREFIX" "$NDLSSDK" "$NDLSSDK" "$ARM_ZLIB_PREFIX" | sudo tee /usr/local/bin/nspire-g++ > /dev/null
        
        # Create wrapper for nspire-ld
        printf '#!/bin/bash\nexec /usr/bin/arm-none-eabi-ld -L%s/lib "$@"\n' "$ARM_ZLIB_PREFIX" | sudo tee /usr/local/bin/nspire-ld > /dev/null
        
        # Create wrapper for nspire-as
        printf '#!/bin/bash\nexec /usr/bin/arm-none-eabi-as "$@"\n' | sudo tee /usr/local/bin/nspire-as > /dev/null
        
        # Make all wrappers executable
        sudo chmod +x /usr/local/bin/nspire-gcc /usr/local/bin/nspire-g++ /usr/local/bin/nspire-ld /usr/local/bin/nspire-as
        
        echo "✓ Compiler wrappers created with ARM zlib paths"
    
    - name: Verify tools
      run: |
        export PATH="/usr/local/bin:$PATH"
        arm-none-eabi-g++ --version
        test -f /opt/ndless/ndless-sdk/include/libndls.h && echo "✓ libndls.h available from Ndless SDK"
        if which nspire-tools >/dev/null 2>&1; then
          NSPIRE_TOOLS=$(command -v nspire-tools)
          echo "✓ nspire-tools found at: $NSPIRE_TOOLS"
          nspire-tools path || true
        else
          echo "✗ ERROR: nspire-tools not available"
          exit 1
        fi
        if which genzehn >/dev/null 2>&1; then
          GENZEHN_BIN=$(command -v genzehn)
          echo "✓ genzehn found at: $GENZEHN_BIN"
          file "$GENZEHN_BIN"
        else
          echo "✗ ERROR: genzehn not available"
          exit 1
        fi
        if which make-prg >/dev/null 2>&1; then
          MAKEPRG_BIN=$(command -v make-prg)
          echo "✓ make-prg found at: $MAKEPRG_BIN"
          file "$MAKEPRG_BIN"
        else
          echo "✗ ERROR: make-prg not available"
          exit 1
        fi
    
    - name: Verify repository structure
      run: |
        echo "Repository contents:"
        ls -la
        
        if [ -f Makefile ]; then
          echo "✓ Makefile found at root"
          echo "Repository structure:"
          ls -la | head -30
        else
          echo "✗ ERROR: Makefile not found!"
          echo ""
          echo "Looking for Makefile files:"
          find . -maxdepth 3 -name Makefile
          exit 1
        fi
    
    - name: Build Crafti Nspire
      run: |
        export PATH="/usr/local/bin:$PATH"
        # Makefile is at repository root, not in crafti/ subdirectory
        if [ ! -f Makefile ]; then
          echo "✗ ERROR: Makefile not found!"
          exit 1
        fi

        # Ensure no stale objects from mismatched toolchains remain.
        find . -name '*.o' -delete
        
        # Full build with mandatory .tns generation
        echo "Building Nspire package (.tns required)..."
        make clean
        make -j$(nproc) || exit 1
        if [ ! -f crafti.tns ]; then
          echo "✗ ERROR: crafti.tns was not generated"
          ls -lh crafti.elf || true
          exit 1
        fi
        ls -lh crafti.tns
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: crafti-build
        path: |
          crafti.tns
          crafti.elf
        retention-days: 30
    
    - name: Upload to releases
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: crafti.tns
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

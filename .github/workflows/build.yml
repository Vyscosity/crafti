name: Build Nspire TNS

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '**.cpp'
      - '**.h'
      - 'Makefile'
      - '.github/workflows/build.yml'
      - 'nGL/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-arm-none-eabi \
          binutils-arm-none-eabi \
          zlib1g-dev \
          libboost-program-options-dev \
          libboost-program-options1.74.0 \
          pkg-config \
          wget \
          unzip
    
    - name: Verify build tools and libraries
      run: |
        echo "Checking build tools and libraries:"
        g++ --version || echo "⚠ g++ not found"
        gcc --version || echo "⚠ gcc not found"
        
        echo ""
        echo "Checking for Boost libraries:"
        find /usr -name "*boost_program_options*" 2>/dev/null | head -20 || echo "⚠ Boost libraries not found"
        
        echo ""
        echo "Checking for zlib:"
        find /usr -name "*z.so*" -o -name "*z.a" 2>/dev/null | head -20 || echo "⚠ zlib not found"
        
        echo ""
        echo "Installed package details:"
        dpkg -l | grep -E "libboost-program-options|zlib1g" || echo "⚠ Some packages may be missing"
        
        echo ""
        echo "Testing g++ compilation with Boost and zlib:"
        cat > /tmp/test.cpp << 'EOF'
        #include <boost/program_options.hpp>
        #include <zlib.h>
        int main() {
          z_const char* msg = "test";
          (void)msg;
          return 0;
        }
        EOF
        
        if g++ -std=c++11 /tmp/test.cpp -lboost_program_options -lz -o /tmp/test 2>&1; then
          echo "✓ Test compilation succeeded"
          /tmp/test && echo "✓ Test binary executed successfully"
        else
          echo "✗ WARNING: Test compilation failed - see error above"
        fi
    
    - name: Install nspire-tools
      run: |
        echo "Installing nspire-tools (optional)..."
        
        # Install genzehn from pre-built binaries
        if ! which genzehn >/dev/null 2>&1; then
          echo "Installing genzehn..."
          cd /tmp
          GENZEHN_INSTALLED=0
          
          for url in \
            "https://github.com/ndless-nspire/ndless/releases/download/v4.5.2/genzehn" \
            "https://github.com/ndless-nspire/ndless/releases/download/v4.4.0/genzehn"
          do
            if wget -q --timeout=10 "$url" -O genzehn 2>/dev/null && file genzehn | grep -q "ELF\|executable"; then
              sudo install -m 755 genzehn /usr/local/bin/
              echo "✓ genzehn installed"
              GENZEHN_INSTALLED=1
              break
            fi
          done
          
          # Try building from source if binary download failed
          if [ $GENZEHN_INSTALLED -eq 0 ]; then
            echo "⚠ Pre-built genzehn not available, attempting to build from source..."
            if [ ! -d /tmp/ndless-src ]; then
              git clone --depth 1 https://github.com/ndless-nspire/ndless.git /tmp/ndless-src 2>/dev/null || true
            fi
            
            if [ -d /tmp/ndless-src ]; then
              GENZEHN_SRC=$(find /tmp/ndless-src -type f -name "genzehn.cpp" 2>/dev/null | head -n 1)
              if [ -n "$GENZEHN_SRC" ]; then
                GENZEHN_DIR=$(dirname "$GENZEHN_SRC")
                echo "Found genzehn source at: $GENZEHN_SRC"
                (cd "$GENZEHN_DIR" && make && sudo install -m 755 genzehn /usr/local/bin/ 2>/dev/null) && GENZEHN_INSTALLED=1 || true
              fi
            fi
          fi
          
          if [ $GENZEHN_INSTALLED -eq 0 ]; then
            echo "⚠ WARNING: genzehn not available - .tns conversion skipped"
          fi
        else
          echo "✓ genzehn already available"
        fi
        
        # Install make-prg from pre-built binaries
        if ! which make-prg >/dev/null 2>&1; then
          echo "Installing make-prg..."
          cd /tmp
          MAKEPRG_INSTALLED=0
          
          for branch in "v4.4.0" "v4.5.0" "master"; do
            if wget -q --timeout=10 "https://raw.githubusercontent.com/ndless-nspire/ndless/$branch/bin/make-prg" -O make-prg 2>/dev/null && file make-prg | grep -q "ELF\|executable"; then
              sudo install -m 755 make-prg /usr/local/bin/
              echo "✓ make-prg installed"
              MAKEPRG_INSTALLED=1
              break
            fi
          done
          
          # Try building from source if binary download failed
          if [ $MAKEPRG_INSTALLED -eq 0 ]; then
            echo "⚠ Pre-built make-prg not available, attempting to build from source..."
            if [ ! -d /tmp/ndless-src ]; then
              git clone --depth 1 https://github.com/ndless-nspire/ndless.git /tmp/ndless-src 2>/dev/null || true
            fi
            
            if [ -d /tmp/ndless-src ]; then
              MAKEPRG_SRC=$(find /tmp/ndless-src -type f -name "make-prg.c" 2>/dev/null | head -n 1)
              if [ -n "$MAKEPRG_SRC" ]; then
                MAKEPRG_DIR=$(dirname "$MAKEPRG_SRC")
                echo "Found make-prg source at: $MAKEPRG_SRC"
                (cd "$MAKEPRG_DIR" && gcc -o make-prg make-prg.c && sudo install -m 755 make-prg /usr/local/bin/ 2>/dev/null) && MAKEPRG_INSTALLED=1 || true
              fi
            fi
          fi
          
          if [ $MAKEPRG_INSTALLED -eq 0 ]; then
            echo "⚠ WARNING: make-prg not available - .tns packaging skipped"
          fi
        else
          echo "✓ make-prg already available"
        fi
    
    - name: Setup nspire compiler symlinks
      run: |
        sudo ln -sf /usr/bin/arm-none-eabi-gcc /usr/local/bin/nspire-gcc
        sudo ln -sf /usr/bin/arm-none-eabi-g++ /usr/local/bin/nspire-g++
        sudo ln -sf /usr/bin/arm-none-eabi-ld /usr/local/bin/nspire-ld
        sudo ln -sf /usr/bin/arm-none-eabi-as /usr/local/bin/nspire-as
    
    - name: Verify tools
      run: |
        arm-none-eabi-g++ --version
        if which genzehn >/dev/null 2>&1; then
          genzehn --version
        else
          echo "⚠ genzehn not available"
        fi
        if which make-prg >/dev/null 2>&1; then
          make-prg --version
        else
          echo "⚠ make-prg not available"
        fi
    
    - name: Verify repository structure
      run: |
        echo "Repository contents:"
        ls -la
        
        if [ -f Makefile ]; then
          echo "✓ Makefile found at root"
          echo "Repository structure:"
          ls -la | head -30
        else
          echo "✗ ERROR: Makefile not found!"
          echo ""
          echo "Looking for Makefile files:"
          find . -maxdepth 3 -name Makefile
          exit 1
        fi
    
    - name: Build Crafti Nspire
      run: |
        # Makefile is at repository root, not in crafti/ subdirectory
        if [ ! -f Makefile ]; then
          echo "✗ ERROR: Makefile not found!"
          exit 1
        fi
        
        # Check if we have the necessary tools
        if ! which genzehn >/dev/null 2>&1; then
          echo "⚠ WARNING: genzehn not available - generating .elf only"
          make clean
          make crafti.elf || exit 1
          exit 0
        fi
        
        if ! which make-prg >/dev/null 2>&1; then
          echo "⚠ WARNING: make-prg not available - generating .elf only"
          make clean
          make crafti.elf || exit 1
          exit 0
        fi
        
        # Full build with .tns generation
        echo "Building complete Nspire package..."
        make clean
        make -j$(nproc) || exit 1
        ls -lh crafti.tns
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: crafti-build
        path: |
          crafti.tns
          crafti.elf
        retention-days: 30
    
    - name: Upload to releases
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: crafti.tns
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
